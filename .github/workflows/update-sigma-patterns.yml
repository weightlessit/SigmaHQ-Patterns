name: Update Sigma Patterns
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone SigmaHQ (shallow)
        run: git clone --depth 1 https://github.com/SigmaHQ/sigma.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract patterns
        run: python extract-sigma-patterns.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sigma_patterns.json
          git diff --cached --quiet || git commit -m "Update Sigma patterns $(date +%Y-%m-%d)"
          git push
